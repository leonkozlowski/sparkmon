# Run this ON EACH DGX Spark node.
#
# Prereqs on the node:
#   - Docker Engine + the Compose plugin
#   - NVIDIA Container Toolkit (DGX OS ships with it; otherwise:
#     https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/latest/install-guide.html )
#
# Then:
#   docker compose up -d
#
# Exposes:
#   node_exporter  -> :9100   (CPU, memory, disk, network, load, ...)
#   dcgm-exporter  -> :9400   (GPU utilization, VRAM, temp, power, clocks, ...)
#
# Make sure your firewall lets the monitoring host reach 9100 and 9400.

services:
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: sparkmon-node-exporter
    restart: unless-stopped
    network_mode: host
    pid: host
    command:
      - "--path.rootfs=/host"
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|run/containerd|var/lib/docker)($$|/)"
      - "--collector.systemd"
    volumes:
      - "/:/host:ro,rslave"

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.9-3.6.1-ubuntu22.04
    container_name: sparkmon-dcgm-exporter
    restart: unless-stopped
    network_mode: host
    cap_add:
      - SYS_ADMIN
    environment:
      DCGM_EXPORTER_LISTEN: ":9400"
      DCGM_EXPORTER_KUBERNETES: "false"
    # GPU access. The `deploy.resources` block works with `docker compose up`.
    # If your Docker is set up the older way, delete the block below and instead
    # add:  runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility]
