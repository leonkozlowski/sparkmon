# Builds release binaries when a v* tag is pushed and attaches them to a
# GitHub Release — these are what install.sh downloads.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build binaries
        run: |
          mkdir -p dist
          for os in linux darwin; do
            for arch in amd64 arm64; do
              CGO_ENABLED=0 GOOS=$os GOARCH=$arch \
                go build -trimpath \
                -ldflags "-s -w -X github.com/leonkozlowski/sparkmon/internal/cli.version=${GITHUB_REF_NAME}" \
                -o "dist/sparkmon-$os-$arch" ./cmd/sparkmon
            done
          done
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sparkmon-*
          generate_release_notes: true
